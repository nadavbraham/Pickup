
<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1D9E75">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pickapp">
<link rel="manifest" href="manifest.json">
<title>Pickapp 👨‍👩‍👧‍👦</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #f5f5f0; min-height: 100vh; direction: rtl; }

/* ---- AUTH SCREEN ---- */
#authScreen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; background: linear-gradient(135deg, #1D9E75 0%, #185FA5 100%); }
#authScreen h1 { font-size:32px; color:white; margin-bottom:6px; }
#authScreen p { color:rgba(255,255,255,0.8); font-size:14px; margin-bottom:2rem; }
.auth-card { background:white; border-radius:20px; padding:1.5rem; width:100%; max-width:340px; box-shadow:0 8px 32px rgba(0,0,0,0.15); }
.auth-card h2 { font-size:18px; color:#1a1a1a; margin-bottom:4px; }
.auth-card p { font-size:13px; color:#888; margin-bottom:1.25rem; }
.phone-input { width:100%; padding:12px 14px; border:1.5px solid #ddd; border-radius:12px; font-size:16px; font-family:inherit; direction:ltr; text-align:center; margin-bottom:12px; }
.phone-input:focus { outline:none; border-color:#1D9E75; }
.auth-btn { width:100%; padding:13px; background:#1D9E75; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; }
.auth-btn:active { opacity:0.85; }
.auth-btn:disabled { background:#aaa; cursor:not-allowed; }
#recaptcha-container { margin-bottom:12px; }

/* ---- MAIN APP ---- */
#appScreen { display:none; max-width:560px; margin:0 auto; padding:0 0 80px 0; }
.top-bar { background:white; padding:14px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #eee; position:sticky; top:0; z-index:10; }
.top-bar h1 { font-size:17px; font-weight:600; color:#1a1a1a; }
.top-bar .week-nav { display:flex; align-items:center; gap:8px; }
.week-btn { background:none; border:1px solid #ddd; border-radius:8px; padding:4px 10px; font-size:13px; cursor:pointer; color:#555; }
.week-label { font-size:12px; color:#666; min-width:110px; text-align:center; }

.main-content { padding:12px; }

/* ---- CHILD CARDS ---- */
.child-card { background:white; border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.child-header { display:flex; align-items:center; gap:10px; padding:12px 14px; border-bottom:1px solid #f0f0f0; }
.child-avatar { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid #e0e0e0; }
.child-info h3 { font-size:15px; font-weight:600; color:#1a1a1a; }
.child-info p { font-size:11px; color:#999; }
.days-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:6px; padding:10px; }
.day-col { display:flex; flex-direction:column; gap:3px; }
.day-header { text-align:center; font-size:10px; font-weight:600; color:#888; }
.day-date { text-align:center; font-size:9px; color:#bbb; margin-bottom:2px; }
.day-cell { min-height:72px; border-radius:10px; border:1px solid #e8e8e8; background:#fafafa; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:4px 2px; transition:all 0.15s; position:relative; }
.day-cell:active { transform:scale(0.96); }
.day-cell.assigned { border:2px solid #1D9E75; background:#E8F8F2; }
.day-cell.has-note { border-bottom:3px solid #185FA5; }
.day-cell .plus { font-size:20px; color:#ccc; }
.day-cell .assignee-emoji { font-size:16px; }
.day-cell .assignee-name { font-size:8.5px; font-weight:600; color:#0F6E56; text-align:center; line-height:1.2; }
.day-cell .time-info { font-size:7.5px; color:#aaa; }
.day-cell .note-dot { position:absolute; top:3px; left:3px; width:6px; height:6px; border-radius:50%; background:#185FA5; }

/* ---- BOTTOM NAV ---- */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #eee; display:flex; max-width:560px; margin:0 auto; }
.nav-btn { flex:1; padding:10px 4px; display:flex; flex-direction:column; align-items:center; gap:3px; background:none; border:none; cursor:pointer; font-family:inherit; }
.nav-btn span:first-child { font-size:20px; }
.nav-btn span:last-child { font-size:10px; color:#aaa; }
.nav-btn.active span:last-child { color:#1D9E75; font-weight:600; }

/* ---- MODAL ---- */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:100; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal-sheet { background:white; border-radius:20px 20px 0 0; padding:1.25rem; width:100%; max-width:560px; direction:rtl; max-height:85vh; overflow-y:auto; }
.modal-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 16px; }
.modal-title { font-size:16px; font-weight:600; color:#1a1a1a; margin-bottom:4px; }
.modal-meta { font-size:12px; color:#666; background:#f8f8f8; padding:8px 12px; border-radius:8px; margin-bottom:14px; line-height:1.6; white-space:pre-line; }
.person-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
.person-btn { display:flex; align-items:center; gap:8px; padding:10px 12px; border-radius:12px; border:1.5px solid #e8e8e8; background:#fafafa; cursor:pointer; font-size:14px; color:#1a1a1a; font-family:inherit; }
.person-btn:active { background:#f0f0f0; }
.person-btn.selected { border-color:#1D9E75; background:#E8F8F2; color:#0F6E56; font-weight:600; }
.person-btn.remove-btn { border-color:#ffdddd; background:#fff8f8; color:#cc3333; grid-column:1/-1; justify-content:center; }
.modal-cancel { width:100%; padding:12px; border:1.5px solid #eee; background:white; border-radius:12px; font-size:14px; color:#888; cursor:pointer; font-family:inherit; }

/* ---- ADMIN PANEL ---- */
#adminPanel { display:none; padding:12px; }
.admin-section { background:white; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.admin-section h3 { font-size:14px; font-weight:600; color:#1a1a1a; margin-bottom:12px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }
.note-form { display:flex; flex-direction:column; gap:8px; }
.note-select, .note-input { width:100%; padding:10px 12px; border:1.5px solid #e8e8e8; border-radius:10px; font-size:14px; font-family:inherit; background:#fafafa; }
.note-select:focus, .note-input:focus { outline:none; border-color:#185FA5; }
.admin-save-btn { padding:11px; background:#185FA5; color:white; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.note-list { display:flex; flex-direction:column; gap:6px; margin-top:8px; }
.note-item { display:flex; align-items:center; justify-content:space-between; padding:8px 10px; background:#f0f7ff; border-radius:8px; font-size:12px; color:#185FA5; }
.note-item .delete-note { background:none; border:none; cursor:pointer; color:#cc3333; font-size:14px; padding:0 4px; }
.users-list { display:flex; flex-direction:column; gap:6px; }
.user-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:#f8f8f8; border-radius:10px; }
.user-item .user-info { display:flex; align-items:center; gap:8px; font-size:13px; }
.user-badge { font-size:10px; padding:2px 8px; border-radius:10px; background:#1D9E75; color:white; font-weight:600; }
.user-badge.admin { background:#185FA5; }

/* ---- SUMMARY PANEL ---- */
#summaryPanel { display:none; padding:12px; }
.summary-card { background:white; border-radius:16px; padding:14px; margin-bottom:12px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
.summary-row { display:flex; align-items:center; justify-content:space-between; padding:7px 0; border-bottom:1px solid #f5f5f5; font-size:13px; }
.summary-row:last-child { border-bottom:none; }
.summary-row .label { color:#888; }
.summary-row .value { font-weight:600; color:#1a1a1a; }
.summary-row .value.empty { color:#ccc; font-weight:400; }
.share-btn { width:100%; padding:13px; background:#25D366; color:white; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; gap:8px; }

/* ---- TOAST ---- */
.toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a1a1a; color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:all 0.3s; z-index:200; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ---- LOADING ---- */
.loading { display:flex; align-items:center; justify-content:center; min-height:100vh; font-size:32px; background:white; }

/* ---- HOLIDAY BADGE ---- */
.holiday-badge { background:#FFF3E0; border:1px solid #FFB74D; border-radius:6px; padding:2px 4px; font-size:7px; color:#E65100; text-align:center; width:100%; margin-top:2px; line-height:1.3; }
</style>
</head>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, RecaptchaVerifier, signInWithPhoneNumber, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, onSnapshot, collection, query, where, getDocs, deleteDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD1PLtpRv65rTudoQ8V9A0mACB-SYduNgs",
  authDomain: "pickapp-b81b1.firebaseapp.com",
  projectId: "pickapp-b81b1",
  storageBucket: "pickapp-b81b1.firebasestorage.app",
  messagingSenderId: "612004406970",
  appId: "1:612004406970:web:a0a749159610214dfcc483"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ---- CONFIG ----
const DAYS = ['ראשון','שני','שלישי','רביעי','חמישי'];
const PEOPLE = {
  '+972523264999': { name:'אבוש', emoji:'👨', admin:true },
  '+972507871134': { name:'אימוש', emoji:'👩' },
  '+972523338913': { name:'סבא אלון', emoji:'👴' },
  '+972547747910': { name:'סבתא', emoji:'👵' },
  '+972524395171': { name:'סבא טובי', emoji:'🧓' }
};

const LIOR_SCHEDULE = [
  { deadline:'12:45', tzaharon:true, note:'חוג עד 15:00' },
  { deadline:'12:45', tzaharon:true },
  { deadline:'13:30', tzaharon:true },
  { deadline:'12:45', tzaharon:true },
  { deadline:'12:45', tzaharon:true, note:'חוג 16:00–17:00' }
];
const RONI_DEADLINE = '16:30';

let weekOffset = 0;
let currentUser = null;
let currentUserData = null;
let unsubAssignments = null;
let unsubNotes = null;
let assignments = {};
let notes = [];
let pendingCell = null;

// ---- UTILS ----
function getWeekDates(offset) {
  const now = new Date();
  const sun = new Date(now);
  sun.setDate(now.getDate() - now.getDay() + offset * 7);
  return Array.from({length:5}, (_,i) => {
    const d = new Date(sun);
    d.setDate(sun.getDate() + i);
    return d;
  });
}

function fmt(d) {
  return d.toLocaleDateString('he-IL', {day:'numeric', month:'numeric'});
}

function getWeekKey(offset) {
  const dates = getWeekDates(offset);
  return fmt(dates[0]).replace('/','') + '-' + fmt(dates[4]).replace('/','');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ---- AUTH ----
let confirmationResult = null;

window.logout = async function() {
  await signOut(auth);
};

document.getElementById('sendSmsBtn').addEventListener('click', async () => {
  const phone = document.getElementById('phoneInput').value.trim();
  const btn = document.getElementById('sendSmsBtn');
  const err = document.getElementById('authError');
  err.style.display = 'none';

  if (!phone || phone.length < 10) {
    err.textContent = 'נא להזין מספר טלפון תקין עם קידומת מדינה (לדוגמה: +972501234567)';
    err.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'שולח...';

  try {
    if (!window.recaptchaVerifier) {
      window.recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', { size: 'invisible' });
    }
    confirmationResult = await signInWithPhoneNumber(auth, phone, window.recaptchaVerifier);
    document.getElementById('phoneStep').style.display = 'none';
    document.getElementById('codeStep').style.display = 'block';
  } catch (e) {
    err.textContent = 'שגיאה: ' + (e.message || 'נסה שוב');
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'שלח קוד SMS';
  }
});

document.getElementById('verifyBtn').addEventListener('click', async () => {
  const code = document.getElementById('codeInput').value.trim();
  const btn = document.getElementById('verifyBtn');
  const err = document.getElementById('authError');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'מאמת...';

  try {
    await confirmationResult.confirm(code);
  } catch(e) {
    err.textContent = 'קוד שגוי, נסה שוב';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'אישור';
  }
});

document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('phoneStep').style.display = 'block';
  document.getElementById('codeStep').style.display = 'none';
  document.getElementById('codeInput').value = '';
});

// ---- AUTH STATE ----
onAuthStateChanged(auth, async (user) => {
  document.getElementById('loadingScreen').style.display = 'none';
  if (user) {
    currentUser = user;
    const phone = user.phoneNumber;
    currentUserData = PEOPLE[phone] || { name: phone, emoji:'👤' };

    // Save user to Firestore
    await setDoc(doc(db, 'users', phone), {
      name: currentUserData.name,
      emoji: currentUserData.emoji,
      admin: currentUserData.admin || false,
      phone,
      lastSeen: serverTimestamp()
    }, { merge: true });

    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';

    if (currentUserData.admin) {
      document.getElementById('navAdmin').style.display = 'flex';
    }

    initApp();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('appScreen').style.display = 'none';
    if (unsubAssignments) unsubAssignments();
    if (unsubNotes) unsubNotes();
  }
});

// ---- APP INIT ----
function initApp() {
  updateWeekLabel();
  subscribeToData();

  document.getElementById('prevWeek').addEventListener('click', () => {
    weekOffset--;
    updateWeekLabel();
    subscribeToData();
  });
  document.getElementById('nextWeek').addEventListener('click', () => {
    weekOffset++;
    updateWeekLabel();
    subscribeToData();
  });

  document.getElementById('modalCancel').addEventListener('click', closeModal);
  document.getElementById('assignModal').addEventListener('click', (e) => {
    if (e.target === document.getElementById('assignModal')) closeModal();
  });

  document.getElementById('saveNoteBtn').addEventListener('click', saveNote);
  document.getElementById('resetWeekBtn').addEventListener('click', resetWeek);
  document.getElementById('shareWhatsApp').addEventListener('click', shareWhatsApp);
  document.getElementById('generateImageBtn').addEventListener('click', generateSummaryImage);
}

function updateWeekLabel() {
  const dates = getWeekDates(weekOffset);
  document.getElementById('weekLabel').textContent = fmt(dates[0]) + '–' + fmt(dates[4]);
}

// ---- FIRESTORE SUBSCRIPTION ----
function subscribeToData() {
  const weekKey = getWeekKey(weekOffset);

  if (unsubAssignments) unsubAssignments();
  if (unsubNotes) unsubNotes();

  // Assignments
  unsubAssignments = onSnapshot(
    doc(db, 'weeks', weekKey),
    (snap) => {
      assignments = snap.exists() ? (snap.data().assignments || {}) : {};
      renderGrids();
    }
  );

  // Notes
  unsubNotes = onSnapshot(
    collection(db, 'weeks', weekKey, 'notes'),
    (snap) => {
      notes = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderGrids();
      if (currentUserData?.admin) renderNoteList();
    }
  );
}

// ---- RENDER GRIDS ----
function renderGrids() {
  renderGrid('lior', 'gridLior');
  renderGrid('roni', 'gridRoni');
  if (document.getElementById('summaryPanel').style.display !== 'none') renderSummary();
}

function renderGrid(child, gridId) {
  const grid = document.getElementById(gridId);
  grid.innerHTML = '';
  const dates = getWeekDates(weekOffset);

  DAYS.forEach((day, i) => {
    const key = child + '_' + i;
    const assigned = assignments[key];
    const schedule = child === 'lior' ? LIOR_SCHEDULE[i] : null;
    const deadline = schedule ? schedule.deadline : RONI_DEADLINE;
    const schedNote = schedule?.note;

    // Find notes for this cell
    const cellNotes = notes.filter(n =>
      (n.child === child || n.child === 'all') &&
      (n.day === String(i) || n.day === 'week')
    );

    const col = document.createElement('div');
    col.className = 'day-col';

    const header = document.createElement('div');
    header.className = 'day-header';
    header.textContent = day;

    const dateEl = document.createElement('div');
    dateEl.className = 'day-date';
    dateEl.textContent = fmt(dates[i]);

    const cell = document.createElement('div');
    cell.className = 'day-cell' + (assigned ? ' assigned' : '') + (cellNotes.length > 0 ? ' has-note' : '');
    cell.onclick = () => openModal(child, i, key);

    if (cellNotes.length > 0) {
      const dot = document.createElement('div');
      dot.className = 'note-dot';
      cell.appendChild(dot);
    }

    if (assigned) {
      const person = Object.values(PEOPLE).find(p => p.name === assigned) || { emoji:'👤' };
      cell.innerHTML += `<span class="assignee-emoji">${person.emoji}</span><span class="assignee-name">${assigned}</span>`;
    } else {
      cell.innerHTML += `<span class="plus">+</span>`;
    }

    cell.innerHTML += `<span class="time-info">עד ${deadline}</span>`;

    if (schedNote) {
      const badge = document.createElement('div');
      badge.className = 'holiday-badge';
      badge.textContent = schedNote;
      col.appendChild(header);
      col.appendChild(dateEl);
      col.appendChild(cell);
      col.appendChild(badge);
      grid.appendChild(col);
      return;
    }

    if (cellNotes.length > 0) {
      const badge = document.createElement('div');
      badge.className = 'holiday-badge';
      badge.textContent = cellNotes[0].text;
      col.appendChild(header);
      col.appendChild(dateEl);
      col.appendChild(cell);
      col.appendChild(badge);
      grid.appendChild(col);
      return;
    }

    col.appendChild(header);
    col.appendChild(dateEl);
    col.appendChild(cell);
    grid.appendChild(col);
  });
}

// ---- MODAL ----
function openModal(child, dayIdx, key) {
  pendingCell = { child, dayIdx, key };
  const childName = child === 'lior' ? 'ליאור' : 'רוני';
  const schedule = child === 'lior' ? LIOR_SCHEDULE[dayIdx] : null;
  const deadline = schedule ? schedule.deadline : RONI_DEADLINE;
  const dates = getWeekDates(weekOffset);

  document.getElementById('modalTitle').textContent = 'מי אוסף את ' + childName + '?';

  let meta = 'יום ' + DAYS[dayIdx] + '  •  ' + fmt(dates[dayIdx]) + '\nסיום מסגרת: ' + deadline;
  if (schedule?.tzaharon) meta += '\n★ צהרון עד 16:30 בתיאום מראש';
  if (schedule?.note) meta += '\n' + schedule.note;

  const cellNotes = notes.filter(n =>
    (n.child === child || n.child === 'all') &&
    (n.day === String(dayIdx) || n.day === 'week')
  );
  cellNotes.forEach(n => { meta += '\n📌 ' + n.text; });

  document.getElementById('modalMeta').textContent = meta;

  const grid = document.getElementById('personGrid');
  grid.innerHTML = '';

  const peopleToShow = currentUserData?.admin
    ? Object.values(PEOPLE)
    : [currentUserData];

  peopleToShow.forEach(person => {
    const btn = document.createElement('button');
    btn.className = 'person-btn' + (assignments[key] === person.name ? ' selected' : '');
    btn.innerHTML = `<span>${person.emoji}</span><span>${person.name}</span>`;
    btn.onclick = () => assign(key, person.name);
    grid.appendChild(btn);
  });

  if (assignments[key]) {
    const removeBtn = document.createElement('button');
    removeBtn.className = 'person-btn remove-btn';
    removeBtn.innerHTML = '🗑️ הסר שיבוץ';
    removeBtn.onclick = () => assign(key, null);
    grid.appendChild(removeBtn);
  }

  document.getElementById('assignModal').classList.add('open');
}

function closeModal() {
  document.getElementById('assignModal').classList.remove('open');
  pendingCell = null;
}

async function assign(key, personName) {
  closeModal();
  const weekKey = getWeekKey(weekOffset);
  const weekRef = doc(db, 'weeks', weekKey);

  const newAssignments = { ...assignments };
  if (personName) {
    newAssignments[key] = personName;
  } else {
    delete newAssignments[key];
  }

  await setDoc(weekRef, { assignments: newAssignments }, { merge: true });
  showToast(personName ? personName + ' שובץ! ✅' : 'שיבוץ הוסר');
}

// ---- NOTES ----
async function saveNote() {
  const child = document.getElementById('noteChild').value;
  const day = document.getElementById('noteDay').value;
  const text = document.getElementById('noteText').value.trim();

  if (!text) { showToast('נא להזין טקסט להערה'); return; }

  const weekKey = getWeekKey(weekOffset);
  const noteRef = doc(collection(db, 'weeks', weekKey, 'notes'));
  await setDoc(noteRef, { child, day, text, createdBy: currentUser.phoneNumber, createdAt: serverTimestamp() });

  document.getElementById('noteText').value = '';
  showToast('הערה נשמרה ✅');
}

function renderNoteList() {
  const list = document.getElementById('noteList');
  if (!list) return;
  list.innerHTML = '';
  notes.forEach(note => {
    const item = document.createElement('div');
    item.className = 'note-item';
    const childLabel = note.child === 'all' ? 'כולם' : note.child === 'lior' ? 'ליאור' : 'רוני';
    const dayLabel = note.day === 'week' ? 'כל השבוע' : 'יום ' + DAYS[parseInt(note.day)];
    item.innerHTML = `<span>${childLabel} | ${dayLabel}: ${note.text}</span>`;
    const del = document.createElement('button');
    del.className = 'delete-note';
    del.textContent = '✕';
    del.onclick = async () => {
      const weekKey = getWeekKey(weekOffset);
      await deleteDoc(doc(db, 'weeks', weekKey, 'notes', note.id));
      showToast('הערה נמחקה');
    };
    item.appendChild(del);
    list.appendChild(item);
  });
}

async function renderUsersList() {
  const list = document.getElementById('usersList');
  if (!list) return;
  const snap = await getDocs(collection(db, 'users'));
  list.innerHTML = '';
  snap.forEach(d => {
    const u = d.data();
    const item = document.createElement('div');
    item.className = 'user-item';
    item.innerHTML = `<div class="user-info"><span>${u.emoji}</span><span>${u.name}</span><span style="font-size:11px;color:#aaa">${u.phone}</span></div>
      <span class="user-badge ${u.admin ? 'admin' : ''}">${u.admin ? 'ADMIN' : 'משתמש'}</span>`;
    list.appendChild(item);
  });
}

async function resetWeek() {
  if (!confirm('למחוק את כל השיבוצים של השבוע?')) return;
  const weekKey = getWeekKey(weekOffset);
  await setDoc(doc(db, 'weeks', weekKey), { assignments: {} }, { merge: true });
  showToast('השיבוצים אופסו ✅');
}

// ---- SUMMARY ----
function renderSummary() {
  const dates = getWeekDates(weekOffset);
  const content = document.getElementById('summaryContent');
  content.innerHTML = `<div style="font-weight:600;font-size:14px;color:#1a1a1a;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f0f0f0">📅 שבוע ${fmt(dates[0])} – ${fmt(dates[4])}</div>`;

  ['lior','roni'].forEach(child => {
    const childName = child === 'lior' ? '👦 ליאור' : '👧 רוני';
    const hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:600;font-size:13px;color:#555;margin:10px 0 4px';
    hdr.textContent = childName;
    content.appendChild(hdr);

    DAYS.forEach((day, i) => {
      const key = child + '_' + i;
      const assigned = assignments[key];
      const row = document.createElement('div');
      row.className = 'summary-row';
      row.innerHTML = `<span class="label">יום ${day} (${fmt(dates[i])})</span>
        <span class="value ${assigned ? '' : 'empty'}">${assigned || '—'}</span>`;
      content.appendChild(row);
    });
  });
}

function shareWhatsApp() {
  const dates = getWeekDates(weekOffset);
  let text = `👨‍👩‍👧‍👦 *Pickapp — מי אוסף השבוע?*\n📅 ${fmt(dates[0])} – ${fmt(dates[4])}\n\n`;

  ['lior','roni'].forEach(child => {
    text += child === 'lior' ? '👦 *ליאור*\n' : '👧 *רוני*\n';
    DAYS.forEach((day, i) => {
      const key = child + '_' + i;
      const a = assignments[key];
      text += `  יום ${day}: ${a || '—'}\n`;
    });
    text += '\n';
  });

  window.open('https://wa.me/?text=' + encodeURIComponent(text));
}

// ---- TABS ----
window.showTab = function(tab) {
  document.getElementById('mainView').style.display = tab === 'home' ? 'block' : 'none';
  document.getElementById('adminPanel').style.display = tab === 'admin' ? 'block' : 'none';
  document.getElementById('summaryPanel').style.display = tab === 'summary' ? 'block' : 'none';

  ['navHome','navSummary','navAdmin'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  const map = { home:'navHome', summary:'navSummary', admin:'navAdmin' };
  const el = document.getElementById(map[tab]);
  if (el) el.classList.add('active');

  if (tab === 'summary') renderSummary();
  if (tab === 'admin') {
    renderNoteList();
    renderUsersList();
  }
};

// ---- GENERATE SUMMARY IMAGE ----
function generateSummaryImage() {
  const btn = document.getElementById('generateImageBtn');
  btn.textContent = '⏳ יוצר תמונה...';
  btn.disabled = true;

  const dates = getWeekDates(weekOffset);
  const W = 600, PAD = 20;
  const ROW_H = 36, HEADER_H = 80, CHILD_H = 50;
  const H = HEADER_H + (CHILD_H + 5 * ROW_H + 20) * 2 + PAD * 2 + 40;

  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // Background
  const grad = ctx.createLinearGradient(0, 0, W, H);
  grad.addColorStop(0, '#1D9E75');
  grad.addColorStop(1, '#185FA5');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // White card
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  roundRect(ctx, PAD, PAD, W - PAD*2, H - PAD*2, 16);
  ctx.fill();

  // Title
  ctx.fillStyle = '#1a1a1a';
  ctx.font = 'bold 20px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('👨‍👩‍👧‍👦 Pickapp — מי אוסף השבוע?', W/2, PAD + 30);
  ctx.fillStyle = '#666';
  ctx.font = '14px Arial';
  ctx.fillText('שבוע ' + fmt(dates[0]) + ' – ' + fmt(dates[4]), W/2, PAD + 52);

  // Draw children
  const EMOJIS_MAP = {'אבוש':'👨','אימוש':'👩','סבתא':'👵','סבא אלון':'👴','סבא טובי':'🧓'};
  let yOff = HEADER_H + PAD;

  ['lior','roni'].forEach(child => {
    const childName = child === 'lior' ? '👦 ליאור' : '👧 רוני';
    const color = child === 'lior' ? '#185FA5' : '#993356';

    // Child header
    ctx.fillStyle = color;
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'right';
    ctx.fillText(childName, W - PAD - 10, yOff + 24);
    yOff += CHILD_H;

    // Day rows
    DAYS.forEach((day, i) => {
      const key = child + '_' + i;
      const assigned = assignments[key];
      const schedule = child === 'lior' ? LIOR_SCHEDULE[i] : null;
      const deadline = schedule ? schedule.deadline : RONI_DEADLINE;

      // Row background
      ctx.fillStyle = assigned ? '#E8F8F2' : '#f8f8f8';
      roundRect(ctx, PAD + 10, yOff, W - PAD*2 - 20, ROW_H - 4, 8);
      ctx.fill();

      if (assigned) {
        ctx.strokeStyle = '#1D9E75';
        ctx.lineWidth = 1.5;
        roundRect(ctx, PAD + 10, yOff, W - PAD*2 - 20, ROW_H - 4, 8);
        ctx.stroke();
      }

      // Day label
      ctx.fillStyle = '#888';
      ctx.font = '13px Arial';
      ctx.textAlign = 'right';
      ctx.fillText('יום ' + day + ' ' + fmt(dates[i]), W - PAD - 20, yOff + 22);

      // Deadline
      ctx.fillStyle = '#bbb';
      ctx.font = '11px Arial';
      ctx.textAlign = 'center';
      ctx.fillText('עד ' + deadline, W/2, yOff + 22);

      // Assigned person
      if (assigned) {
        const emoji = EMOJIS_MAP[assigned] || '👤';
        ctx.font = '16px Arial';
        ctx.textAlign = 'left';
        ctx.fillText(emoji + ' ' + assigned, PAD + 20, yOff + 22);
      } else {
        ctx.fillStyle = '#ccc';
        ctx.font = '13px Arial';
        ctx.textAlign = 'left';
        ctx.fillText('—', PAD + 20, yOff + 22);
      }

      yOff += ROW_H;
    });

    yOff += 20;
  });

  // Footer
  ctx.fillStyle = '#aaa';
  ctx.font = '11px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('נבנה באהבה 💚 Pickapp', W/2, H - PAD - 8);

  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  document.getElementById('summaryImgPreview').src = dataUrl;
  document.getElementById('summaryImgDownload').href = dataUrl;
  document.getElementById('imagePreviewWrap').style.display = 'block';

  btn.textContent = '📸 צור תמונה לשליחה';
  btn.disabled = false;

  window._summaryImageUrl = dataUrl;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

window.shareImageWhatsApp = function() {
  const dates = getWeekDates(weekOffset);
  let text = '👨‍👩‍👧‍👦 *Pickapp — מי אוסף השבוע?*\n📅 ' + fmt(dates[0]) + ' – ' + fmt(dates[4]) + '\n\n';
  ['lior','roni'].forEach(child => {
    text += child === 'lior' ? '👦 *ליאור*\n' : '👧 *רוני*\n';
    DAYS.forEach((day, i) => {
      const a = assignments[child + '_' + i];
      text += '  יום ' + day + ': ' + (a || '—') + '\n';
    });
    text += '\n';
  });
  window.open('https://wa.me/?text=' + encodeURIComponent(text));
};
